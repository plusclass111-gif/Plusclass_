<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> نظام حجز مصادر التعلم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --toffee-brown: #dcd3ce; --dark-navy: #346375; --white: #ffffff; --booked-red: #c1121f; --free-green: #155d27; }
        body { margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; background-color: var(--toffee-brown); color: var(--dark-navy); }
        .header-banner { width: 100%; background-color: var(--white); border-bottom: 5px solid var(--dark-navy); text-align: center; }
        .header-banner img { width: 100%; max-height: 200px; object-fit: contain; display: block; }
        header { background-color: var(--dark-navy); color: white; padding: 20px 10px; text-align: center; position: relative; }
        .main-title { font-family: 'Amiri', serif; font-size: 35px; color: var(--toffee-brown); margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .menu-btn { position: absolute; right: 20px; top: 25px; font-size: 30px; cursor: pointer; color: white; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background-color: var(--dark-navy); overflow-x: hidden; transition: 0.4s; padding-top: 60px; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; border-bottom: 1px solid #2c3e50; }
        .periods-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .period-card { background: #fdfdfd; border: 2px solid var(--dark-navy); border-radius: 15px; padding: 20px 10px; text-align: center; font-weight: bold; box-shadow: 0 6px 0 var(--dark-navy); transition: 0.2s; cursor: pointer; }
        .period-card:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark-navy); }
        .is-booked { border-color: var(--booked-red) !important; box-shadow: 0 6px 0 var(--booked-red) !important; background: #fff5f5 !important; cursor: default; }
        .status-text { font-size: 13px; margin-top: 8px; font-weight: 800; }
        .content-section { padding: 20px; display: none; min-height: 80vh; }
        .active-section { display: block; }
        .data-card { background: white; border-radius: 15px; padding: 15px; border: 2px solid var(--dark-navy); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid var(--dark-navy); padding: 12px; text-align: center; font-size: 14px; }
        th { background: var(--dark-navy); color: white; }
        .modal { display: none; position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; width: 85%; max-width: 400px; border-radius: 15px; border: 3px solid var(--dark-navy); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-family: 'Tajawal'; box-sizing: border-box; }
        .btn-action { background: var(--dark-navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--booked-red); color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold;}
        .footer { background-color: var(--dark-navy); color: white; text-align: center; padding: 20px; margin-top: 30px; font-size: 14px; border-top: 4px solid var(--toffee-brown); }
    </style>
</head>
<body>

<div class="header-banner"><img src="https://i.top4top.io/p_36866s7840.png"></div>
<header>
    <div class="menu-btn" onclick="openNav()">☰</div>
    <h1 class="main-title">في عالم الرقمنة... مرحباً بكم في نظام حجز مصادر التعلم</h1>
</header>

<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" onclick="closeNav()" style="font-size:35px;">×</a>
    <a href="#" onclick="showSection('booking')">📅 حجز الحصص</a>
    <a href="#" onclick="showSection('report')">📋 سجل الحجوزات اليومي</a>
    <a href="#" onclick="showSection('settings')">⚙️ الإعدادات</a>
</div>

<div id="booking" class="content-section active-section">
    <div class="periods-grid" id="periodsGrid"></div>
</div>

<div id="report" class="content-section">
    <div class="data-card">
        <h3>📋 سجل الحجوزات اليومي</h3>
        <input type="date" id="searchDate" onchange="renderReport()">
        <table>
            <thead><tr><th>الحصة</th><th>المعلمة</th><th>التخصص</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
        </table>
        <button class="btn-action" style="margin-top:15px; background:var(--free-green);" onclick="window.print()">🖨️ طباعة</button>
    </div>
</div>

<div id="settings" class="content-section">
    <div class="data-card">
        <h3>👩‍🏫 إدارة المعلمات</h3>
        <input type="text" id="newTeacherName" placeholder="اسم المعلمة">
        <button class="btn-action" onclick="addTeacher()">إضافة معلمة +</button>
        <hr>
        <select id="deleteTeacherSelect"></select>
        <button class="btn-danger" onclick="removeTeacher()">حذف المعلمة -</button>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">تأكيد الحجز</h3>
        <select id="modalTeacherSelect"></select>
        <select id="modalSubjectSelect"></select>
        <button class="btn-action" onclick="confirmBooking()">تأكيد الحجز ✅</button>
        <button onclick="closeModal()" style="width:100%; border:none; background:none; color:red; margin-top:10px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<footer class="footer">
<p>تصميم: نوال ناجم الغنبوصية</p>
<p>مديرة المدرسة: أ. شغيلة العلوية</p>
</footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz02RQ6Jr3roZt-TCnw_EwBqI-dK7KUzJ7Wn8ZuEkW_glfMqC3MuYxbnMwwn29s0fUbng/exec";
    
    let teachers = ["أسماء بنت خلفان الغنبوصي", "أفراح بنت ناصر الغنبوصي", "آمنة بنت ناصر الغنبوصي", "بدرية بنت راشد الغنبوصي", "بدور بنت ناصر الغيلاني", "تهانى بنت ناصر الغنبوصى", "جميلة بنت سالم الزرعي", "خديجة بنت صالح الغنبوصي", "راية بنت على الغنبوصي", "راية بنت محمد الغنبوصي", "رحاب بنت سالم الغنبوصي", "رحمة بنت حمد الروتلي", "رحمة بنت سعيد الحربي", "رحمة بنت ناجم الغنبوصي", "سارة بنت سالم الغنبوصي", "سارة بنت صالح البلوشية", "سالمة بنت خميس الغنبوصية", "سعادة بنت عبدالله الكاسبية", "سكينة بنت جمعة الغيلاني", "سليمة بنت سالم الغزالي", "سليمة بنت عبدالله الغنبوصى", "شغيلة بنت سعيد العلوي", "شهد بنت محمد الحربي", "شيخة بنت صالح الغنبوصي", "شيخة بنت على الغنبوصي", "شيخة بنت مسلم الحربي", "شيماء بنت ناصر الغنبوصى", "طاهرة بنت ناصر الغنبوصي", "عائشة بنت سعيد الغزالية", "عشيبة بنت مسعود الكاسبي", "غالية بنت علي الساعدي", "فاطمة بنت ناصر الغنبوصي", "مآثر بنت محمد الغنبوصي", "مروة بنت راشد الغنبوصي", "مريم بنت سالم الغيلاني", "مريم بنت سالم الغنبوصي", "مريم بنت علي الحربي", "مريم بنت مسلم الغنبوصي", "منال بنت سالم الغنبوصي", "موزة بنت سعيد الغنبوصي", "موزة بنت على الغنبوصي", "نافجة بنت سالم الستمي", "نصرى بنت صالح السنيدي", "نعيمة بنت مصبح الساعدي", "نوال بنت ناجم الغنبوصي", "هاجر بنت ربيع الغنبوصية", "هالة بنت خلفان الغنبوصية", "هدى بنت على الغنبوصية", "وفاء بنت عبدالله الغنبوصية", "يسرا بنت على الغنبوصية", "أبرار بنت خلفان الغنبوصية", "صالحة بنت سالم الغنبوصية", "هيام بنت صالح العريمية", "هدى بنت محمد الغنبوصية", "هيام بنت حمد الغنبوصية", "وداد بنت عبدالله الغنبوصية", "وضحى بنت ماجد الغنبوصية"];
    let subjects = ["ديني قيمي", "اللغة العربية", "العلوم", "الرياضيات", "الدراسات الاجتماعية", "الفيزياء", "الكيمياء", "الاحياء", "اللغة الانجليزية", "تقنية المعلومات", "مهارات الموسيقية", "مهارات الحياتية", "الأدارة", "مجال ثاني علوم", "مجال ثاني رياضيات", "الفنون البصرية", "الرياضة البدنية"];
    let allBookings = [];
    let currentPeriod = null;
    const pNames = ["الأولى", "الثانية", "الثالثة", "الرابعة", "الخامسة", "السادسة", "السابعة", "الثامنة"];

    function openNav() { document.getElementById("mySidebar").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        if(id === 'settings') updateSettingsLists();
        closeNav();
    }

    async function fetchBookings() {
        try {
            const res = await fetch(`${SCRIPT_URL}?nocache=${Date.now()}`);
            allBookings = await res.json();
            renderGrid();
            renderReport();
        } catch (e) { console.error("خطأ في الجلب"); }
    }

    function renderGrid() {
        const grid = document.getElementById('periodsGrid');
        grid.innerHTML = '';
        const today = new Date().toISOString().split('T')[0];
        pNames.forEach((name, i) => {
            const pNum = i + 1;
            const b = allBookings.find(x => x.period == pNum && x.date == today);
            const card = document.createElement('div');
            card.className = `period-card ${b ? 'is-booked' : ''}`;
            card.innerHTML = `<div>الحصة ${name}</div><div class="status-text">${b ? '🔒 '+b.teacher : '🟢 متاحة'}</div>`;
            if(!b) card.onclick = () => openModal(pNum);
            grid.appendChild(card);
        });
    }

    function openModal(p) {
        currentPeriod = p;
        // تحديث القائمة قبل فتح المودال لضمان ظهور الأسماء الجديدة
        document.getElementById('modalTeacherSelect').innerHTML = teachers.map(t => `<option value="${t}">${t}</option>`).join('');
        document.getElementById('modalSubjectSelect').innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('bookingModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

    async function confirmBooking() {
        const teacher = document.getElementById('modalTeacherSelect').value;
        const subject = document.getElementById('modalSubjectSelect').value;
        const date = new Date().toISOString().split('T')[0];
        
        allBookings.push({ date, period: currentPeriod, teacher, subject });
        renderGrid();
        closeModal();

        const query = `?action=add&date=${date}&period=${currentPeriod}&teacher=${encodeURIComponent(teacher)}&subject=${encodeURIComponent(subject)}`;
        
        try {
            await fetch(SCRIPT_URL + query, { mode: 'no-cors' });
            setTimeout(fetchBookings, 2000);
        } catch (e) { console.error("فشل الإرسال"); }
    }

    // --- الدوال الجديدة لإدارة المعلمات ---
    function addTeacher() {
        const nameInput = document.getElementById('newTeacherName');
        const name = nameInput.value.trim();
        if (name === "") return alert("أدخلي اسم المعلمة");
        if (teachers.includes(name)) return alert("الاسم موجود مسبقاً");

        teachers.push(name);
        teachers.sort(); // ترتيب أبجدي
        updateSettingsLists();
        nameInput.value = "";
        alert("تمت الإضافة بنجاح");
    }

    function removeTeacher() {
        const select = document.getElementById('deleteTeacherSelect');
        const name = select.value;
        if (!name) return;

        if (confirm(`حذف المعلمة: ${name}؟`)) {
            teachers = teachers.filter(t => t !== name);
            updateSettingsLists();
            alert("تم الحذف");
        }
    }

    function updateSettingsLists() {
        const options = teachers.map(t => `<option value="${t}">${t}</option>`).join('');
        document.getElementById('deleteTeacherSelect').innerHTML = options;
    }
    // ----------------------------------

    function renderReport() {
        const searchInput = document.getElementById('searchDate').value;
        const tbody = document.getElementById('reportTableBody');
        tbody.innerHTML = '';
        if(!searchInput) return;
        const filtered = allBookings.filter(b => String(b.date).trim() === String(searchInput).trim());
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="color:red;">لا توجد حجوزات لهذا التاريخ</td></tr>';
            return;
        }
        filtered.sort((a, b) => a.period - b.period).forEach(b => {
            tbody.innerHTML += `<tr><td>الحصة ${pNames[parseInt(b.period)-1]}</td><td>${b.teacher}</td><td>${b.subject}</td></tr>`;
        });
    }

    window.onload = fetchBookings;
</script>
</body>
</html>
